/* ---------- 追加並去重 ---------- */
function mergeTopicBank(base, extra) {
  const seen = new Set(base.map(x => x.title));
  extra.forEach(item => {
    if (!seen.has(item.title)) {
      base.push(item);
      seen.add(item.title);
    }
  });
}

/* ---------- 模考增強：讓 P2 後必接同一主題 P3，並含準備階段 ---------- */
window.startMockExam = function () {
  APP_STATE.mock.queue = [];
  APP_STATE.mock.currentIndex = -1;
  APP_STATE.mock.logs = ['考試開始。'];
  APP_STATE.mock.transcripts = [];
  APP_STATE.mock.started = true;

  const p1Topics = [...P1_BANK].sort(() => Math.random() - 0.5).slice(0, 3);
  p1Topics.forEach(topic => {
    const selected = [...topic.questions].sort(() => Math.random() - 0.5).slice(0, 2);
    selected.forEach(q => {
      APP_STATE.mock.queue.push({
        part: 'P1',
        topic: topic.title,
        prompt: q,
        hidden: true,
        maxSeconds: 45
      });
    });
  });

  const chosenP23 = P23_BANK[Math.floor(Math.random() * P23_BANK.length)];
  APP_STATE.mock.queue.push({
    part: 'P2',
    topic: chosenP23.title,
    prompt: chosenP23.p2.join('\n'),
    hidden: false,
    maxSeconds: 150
  });

  chosenP23.p3.slice(0, 3).forEach(q => {
    APP_STATE.mock.queue.push({
      part: 'P3',
      topic: chosenP23.title,
      prompt: q,
      hidden: true,
      maxSeconds: 80
    });
  });

  document.getElementById('mockFeedback').textContent = '考試進行中，完成後生成反饋。';
  document.getElementById('mockStageLabel').textContent = 'Preparation';
  document.getElementById('mockTitle').textContent = '請準備開始考試';
  document.getElementById('mockMeta').textContent = '系統將先進入簡短準備提示，然後開始正式流程。';
  document.getElementById('mockPromptArea').innerHTML = `
    <div class="hidden-prompt">
      <div class="label">Get Ready</div>
      <div class="big">即將開始模考</div>
    </div>
  `;
  document.getElementById('mockTimer').textContent = '00:05';
  document.getElementById('mockSubtle').textContent = '請確認麥克風已開啟，環境安靜。';
  document.getElementById('mockProgress').style.width = '0%';

  let prep = 5;
  if (APP_STATE.mock.timer) clearInterval(APP_STATE.mock.timer);
  APP_STATE.mock.timer = setInterval(() => {
    prep--;
    document.getElementById('mockTimer').textContent = `00:0${prep}`;
    document.getElementById('mockProgress').style.width = `${(5 - prep) * 20}%`;
    if (prep <= 0) {
      clearInterval(APP_STATE.mock.timer);
      APP_STATE.mock.timer = null;
      moveToNextMockQuestion();
    }
  }, 1000);
};

/* ---------- 模考即時日誌更完整 ---------- */
window.updateMockLog = function () {
  const logBox = document.getElementById('mockLiveLog');
  if (!logBox) return;
  logBox.textContent = APP_STATE.mock.logs.join('\n');
};

/* ---------- 考後反饋增強：按部分輸出 ---------- */
window.generateMockFeedback = function (items) {
  if (!items.length) {
    return '這次沒有成功錄到有效內容。請先檢查瀏覽器麥克風權限，再重新進行完整模考。';
  }

  const allText = items.map(i => i.transcript || '').join(' ').trim();
  const totalDuration = items.reduce((sum, i) => sum + (i.duration || 0), 0);
  const wordCount = allText ? allText.split(/\s+/).filter(Boolean).length : 0;
  const wpm = totalDuration > 0 ? Math.round(wordCount / (totalDuration / 60)) : 0;
  const fillers = allText.match(/\b(um|uh|like|you know|well)\b/gi) || [];

  const p1 = items.filter(i => i.part === 'P1');
  const p2 = items.find(i => i.part === 'P2');
  const p3 = items.filter(i => i.part === 'P3');

  const notes = [];

  if (!allText) {
    notes.push('1. 幾乎沒有有效轉錄內容，先優先解決錄音與收音問題。');
    notes.push('2. 建議使用安靜環境，並讓麥克風靠近嘴巴一些。');
    notes.push('3. 完成收音後再做一次完整模考，反饋會準確得多。');
    return notes.join('\n');
  }

  if (wpm < 85) {
    notes.push('1. 整體語速偏慢，開頭思考時間稍長。建議每題先直接表態，再補原因與例子。');
  } else if (wpm > 165) {
    notes.push('1. 整體語速偏快，部分內容可能不夠清楚。建議在轉折點和例子前放慢一點。');
  } else {
    notes.push('1. 整體語速區間不錯，基本接近正常應試節奏。');
  }

  if (fillers.length >= 8) {
    notes.push('2. 填充詞偏多，例如 um / uh / like。可以把填充詞改成短停頓，聽感會更成熟。');
  } else if (fillers.length >= 3) {
    notes.push('2. 填充詞有一些，但仍可控制。多做「先想 1 秒再說」的節奏訓練會有幫助。');
  } else {
    notes.push('2. 填充詞控制得不錯，輸出相對乾淨。');
  }

  const p1Short = p1.filter(x => x.duration < 15).length;
  if (p1Short >= 2) {
    notes.push('3. P1 有幾題偏短，說明延伸不足。建議每題至少用 2 到 4 句回答。');
  } else {
    notes.push('3. P1 整體回答長度還可以，基本不會顯得太單薄。');
  }

  if (p2) {
    const p2Words = (p2.transcript || '').split(/\s+/).filter(Boolean).length;
    if (p2Words < 90) {
      notes.push('4. P2 內容偏短。建議固定用「背景 → 細節 → 感受 → 結果」四段式撐滿主體。');
    } else if (p2Words < 140) {
      notes.push('4. P2 已有基本內容，但細節還可以更具體，比如時間、人物、場景與你的感受。');
    } else {
      notes.push('4. P2 內容厚度不錯，接下來可以加強連接詞與故事線，讓整段更順。');
    }
  }

  const p3Short = p3.filter(x => x.duration < 18).length;
  if (p3Short >= 2) {
    notes.push('5. P3 延伸偏短，代表分析層次還不夠。建議至少做到「觀點 + 原因 + 例子」。');
  } else {
    notes.push('5. P3 基本能延伸，這對整體口語表現很有幫助。');
  }

  notes.push('6. 目前暫時不給分數，建議先把節奏、完整度、延伸能力和語音清晰度穩定下來。');

  return notes.join('\n');
};

/* ---------- 額外：模考題目重播修正 ---------- */
window.playCurrentMockQuestion = function () {
  if (!APP_STATE.mock.started) return;
  const current = APP_STATE.mock.queue[APP_STATE.mock.currentIndex];
  if (!current) return;
  speak(current.prompt.replace(/\n/g, '. '));
};

/* ---------- 額外：手動跳題修正 ---------- */
window.skipMockQuestion = function () {
  if (!APP_STATE.mock.started) return;
  stopAnyRecording();
  APP_STATE.mock.logs.push(`手動跳過：${APP_STATE.mock.currentPromptText}`);
  updateMockLog();
  moveToNextMockQuestion();
};

    alert('你的瀏覽器目前不支援錄音。建議使用最新版 Safari 或 Chrome。');

})();

renderAllRecordings();
</script>
