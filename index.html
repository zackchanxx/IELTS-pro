<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Speaking Pro</title>
<style>
  :root { --bg: #fbfbfd; --text: #1d1d1f; --blue: #0071e3; --card-bg: #ffffff; }
  body { 
    margin: 0; 
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif; 
    background-color: var(--bg); 
    color: var(--text); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh; 
    padding: 20px; 
    box-sizing: border-box; 
  }
  .container { max-width: 600px; width: 100%; text-align: center; }
  h1 { font-size: 48px; font-weight: 600; letter-spacing: -0.003em; margin-bottom: 10px; }
  p.subtitle { font-size: 24px; color: #86868b; margin-bottom: 40px; font-weight: 400; }
  .card { 
    background: var(--card-bg); 
    border-radius: 18px; 
    padding: 40px; 
    box-shadow: 0 4px 24px rgba(0,0,0,0.04); 
    margin-bottom: 30px; 
  }
  .tag { font-size: 12px; font-weight: 600; color: #86868b; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 15px; display: block; }
  .question { font-size: 28px; font-weight: 500; line-height: 1.3; min-height: 100px; display: flex; align-items: center; justify-content: center; }
  button { 
    background-color: var(--blue); 
    color: white; 
    border: none; 
    border-radius: 980px; 
    padding: 14px 28px; 
    font-size: 17px; 
    font-weight: 400; 
    cursor: pointer; 
    transition: background 0.2s; 
  }
  button:hover { background-color: #0077ED; }
  button:active { transform: scale(0.98); }
</style>
</head>
<body>
<div class="container">
  <h1>Speaking Pro</h1>
  <p class="subtitle">Your personal examiner.</p>
  <div class="card">
    <span class="tag" id="part-tag">Welcome</span>
    <div class="question" id="question-text">Click "Next Question" to start your mock test.</div>
  </div>
  <button onclick="nextQuestion()">Next Question</button>
</div>

<script>
  // 雅思近期高頻題庫
  const questions = [
    { part: "Part 1 - Work or Study", text: "Do you work or are you a student?" },
    { part: "Part 1 - Hometown", text: "Please describe your hometown a little." },
    { part: "Part 1 - Music", text: "What kind of music do you like listening to?" },
    { part: "Part 1 - Technology", text: "How often do you use social media?" },
    { part: "Part 2 - Cue Card", text: "Describe a person who inspired you. You should say: who it is, what they did, and explain how you feel about this person." },
    { part: "Part 3 - Inspiration", text: "Do you think children are easily inspired by their teachers?" },
    { part: "Part 3 - Inspiration", text: "What role do famous people play in inspiring the youth?" }
  ];

  let synth = window.speechSynthesis;

  function nextQuestion() {
    const q = questions[Math.floor(Math.random() * questions.length)];
    document.getElementById('part-tag').innerText = q.part;
    document.getElementById('question-text').innerText = q.text;
    
    // 呼叫瀏覽器語音 (英式口音)
    if (synth.speaking) { synth.cancel(); }
    let utterThis = new SpeechSynthesisUtterance(q.text);
    utterThis.lang = 'en-GB'; 
    utterThis.rate = 0.9; // 調整語速模仿真實考官
    synth.speak(utterThis);
  }
</script>
</body>
</html>
